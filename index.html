<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Tone Generator</h1>
        <div>
            <label for="ifreq">Frequência</label>
            <input type="range" name="freq" id="ifreq" min="20" max="20000" value="440">
            <span id="freq-value">440</span>

            <label for="ivolume">Volume</label>
            <input type="range" name="volume" id="ivolume" min="0" max="1" value="0.5" step="0.1">
            <span id="volume-value">0.5</span>

            <label for="iwaveform"> Forma de Onda:</label>
            <select name="waveform" id="iwaveform">
                <option value="sine">Senóide</option>
                <option value="triangle">Triangular</option>
                <option value="square">Quadrada</option>
                <option value="sawtooth">Dente de serra</option>
            </select>

            <button id="play-pause">Play</button>
        </div>
    </main>
    <script src="tonegenerator.js"></script>
</body>
</html>
